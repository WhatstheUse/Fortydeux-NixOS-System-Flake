
# Miracle-WM Configuration

# Action key
action_key: meta

# Input device configuration - consistent with your other WM setups
input:
  touchpad:
    natural_scroll: true
    accel_speed: 0.3
    click_method: clickfinger
    tap_enabled: true
    dwt_enabled: true  # disable while typing
    middle_emulation: true
  
  mouse:
    natural_scroll: true
    # accel_speed: 0.4

  pointer:
    natural_scroll: true
    # accel_speed: 0.4
  
  keyboard:
    numlock_on_startup: true
    repeat_rate: 50
    repeat_delay: 300

# Cursor
cursor:
  scale: 2.0
  focus_mode: hover

# Window borders
border:
  size: 2
  color: 0x505050ff
  focus_color: 0x7fc8ffff

# Drag and Drop
drag_and_drop:
  enabled: true
  modifiers:
    - primary
    - shift

# Move
move_modifier:
  - primary

# Default action overrides
# default_action_overrides:
#   - name: toggle_stacking
#   - action: "down"
#   - modifiers:
#       - primary
#       - shift
#   - key: KEY_S

#   # Override default quit_compositor with working pkill method
#   - name: quit_compositor
#   - action: "down"
#   - modifiers:
#       - primary
#       - shift
#   - key: KEY_E
#   - command: pkill miracle-wm

#   # Override close focused window from Super+Shift+Q to Super+Q
#   - name: close_window
#   - action: "down"
#   - modifiers:
#       - primary
#   - key: KEY_Q

# Core custom actions for consistent experience across WMs
custom_actions:
  # Built-in exit method (buggy - for testing only)
  # - command: miracle-wm --quit-compositor
  #   action: down
  #   modifiers:
  #     - primary
  #     - shift
  #   key: KEY_Q

  # Launcher keybindings - consistent across your configs
  - command: anyrun
    action: down
    modifiers:
      - alt
    key: KEY_SPACE
  
  - command: fuzzel
    action: down
    modifiers:
      - primary
    key: KEY_SPACE

  # Terminal
  - command: kitty
    action: down
    modifiers:
      - primary
    key: KEY_S


  # Volume controls - consistent across your configs
  - command: wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
    action: down
    modifiers: []
    key: KEY_VOLUMEUP

  - command: wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
    action: down
    modifiers: []
    key: KEY_VOLUMEDOWN

  - command: wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
    action: down
    modifiers: []
    key: KEY_MUTE

  # Brightness controls
  - command: brightnessctl set 5%+
    action: down
    modifiers: []
    key: KEY_BRIGHTNESSUP

  - command: brightnessctl set 5%-
    action: down
    modifiers: []
    key: KEY_BRIGHTNESSDOWN

  # Exit the session cleanly via UWSM (parity with Sway/River/Wayfire)
  - command: uwsm stop
    action: down
    modifiers:
      - primary
      - shift
    key: KEY_E

  # Screenshot (full screen) -> Satty editor
  - command: "sh -c 'grim -t ppm - | satty -f - --output-filename $HOME/Pictures/Screenshots/satty-$(date +%Y%m%d-%H%M%S).png'"
    action: down
    modifiers: []
    key: KEY_PRINT

  # Toggle Waybar
  # - command: pkill waybar || waybar
  #   action: down
  #   modifiers:
  #     - primary
  #   key: KEY_B


# Startup applications - using Waybar like your other configs
startup_apps:
  # Hand the session off to UWSM: import WAYLAND_DISPLAY into the systemd/D-Bus
  # activation environment and activate graphical-session.target so the user
  # services (mako, polkit-agent, etc.) start. Must run first.
  - command: uwsm finalize
    restart_on_death: false
  # Wallpaper (mirrors swaybg usage in the other compositors)
  - command: "sh -c 'swaybg -m fill -i $HOME/.config/wallpapers/aurora.jpg'"
    restart_on_death: true
  # Waybar, pointed at the MiracleWM-specific config/style
  - command: "sh -c 'waybar -c $HOME/.config/miracle-wm/waybar/config -s $HOME/.config/miracle-wm/waybar/style.css'"
    restart_on_death: false
  - command: nm-applet --indicator
    restart_on_death: false
  - command: blueman-applet
    restart_on_death: false
  - command: wlsunset -l 40.6 -L -75.4 -t 2300 -T 6500
    restart_on_death: false
  - command: pcloud
    restart_on_death: false
